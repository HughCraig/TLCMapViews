<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
            content="initial-scale=1,maximum-scale=1,user-scalable=no" />
        <meta property="og:title" content="TLCMap Multilayer Timeline Viewer">
        <meta property="og:image" content="https://views.tlcmap.org/latest/img/tlcmaplogofull_sm50.png">
        <link rel="stylesheet" href="./view.css" />
        <link rel="stylesheet" href="collection-legend.css" />
        <link rel="stylesheet"
